<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Auditoría de Sistemas I</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .pantalla {
            display: none;
        }

        .pantalla.activo {
            display: block;
        }

        .inicio-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group label .requerido {
            color: #ef4444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            margin-bottom: 30px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .pregunta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .pregunta-numero {
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
        }

        .pregunta-numero-grande {
            font-size: 18px;
        }

        .pregunta-texto {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 500;
        }

        .opciones {
            margin-bottom: 30px;
        }

        .opcion {
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .opcion:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }

        .opcion.seleccionado {
            border-color: #667eea;
            background: #f0f4ff;
            font-weight: 600;
        }

        .opcion input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .opcion-texto {
            flex: 1;
        }

        .verdadero-falso {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .vf-opcion {
            padding: 25px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 16px;
        }

        .vf-opcion:hover {
            transform: translateY(-2px);
        }

        .vf-opcion.verdadero:hover {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .vf-opcion.falso:hover {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .vf-opcion.verdadero.seleccionado {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #22c55e;
        }

        .vf-opcion.falso.seleccionado {
            border-color: #ef4444;
            background: #fef2f2;
            color: #ef4444;
        }

        .instruccion-asociacion {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 3px;
            font-size: 14px;
            color: #1e40af;
            font-weight: 600;
        }

        .asociacion-lista {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: 600;
            color: #92400e;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .asociacion-vacia {
            color: #999;
            font-weight: normal;
            font-style: italic;
        }

        .asociacion-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .asociacion-columna {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .asociacion-titulo {
            font-weight: 700;
            color: #667eea;
            font-size: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .asociacion-item {
            padding: 14px 16px;
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            font-weight: 500;
            text-align: center;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .asociacion-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .asociacion-item.termino-activo {
            border-color: #f59e0b;
            background: #fef3c7;
            font-weight: 700;
        }

        .asociacion-item.conectado {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #16a34a;
            font-weight: 700;
        }

        .asociacion-item.conectado::after {
            content: ' ✓';
            margin-left: 8px;
        }

        .botones-navegacion {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 40px;
        }

        .resultado-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            border-radius: 10px;
        }

        .resultado-header.aprobado {
            background: #f0fdf4;
            border: 2px solid #22c55e;
        }

        .resultado-header.reprobado {
            background: #fef2f2;
            border: 2px solid #ef4444;
        }

        .resultado-icono {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .resultado-titulo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .resultado-header.aprobado .resultado-titulo {
            color: #22c55e;
        }

        .resultado-header.reprobado .resultado-titulo {
            color: #ef4444;
        }

        .puntuacion {
            text-align: center;
            margin: 30px 0;
        }

        .puntuacion-numero {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .puntuacion-porcentaje {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .detalles-respuestas {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin: 30px 0;
            max-height: 500px;
            overflow-y: auto;
        }

        .respuesta-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .respuesta-item:last-child {
            border-bottom: none;
        }

        .respuesta-numero {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .respuesta-estado {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .respuesta-correcta {
            background: #d1fae5;
            color: #065f46;
        }

        .respuesta-incorrecta {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .justificacion {
            font-size: 12px;
            margin: 6px 0;
            padding: 8px;
            border-radius: 3px;
            line-height: 1.5;
        }

        .justificacion-bien {
            background: #f0fdf4;
            border-left: 3px solid #22c55e;
            color: #166534;
        }

        .justificacion-mejorar {
            background: #fef2f2;
            border-left: 3px solid #ef4444;
            color: #991b1b;
        }

        .sugerencia-repaso {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            color: #92400e;
            font-size: 11px;
            padding: 6px;
            margin-top: 4px;
        }

        .botones-finales {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-descargar {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .btn-descargar:hover:not(:disabled) {
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
        }

        .advertencia-pdf {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #92400e;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 20px;
            }

            .asociacion-wrapper {
                grid-template-columns: 1fr;
            }

            .verdadero-falso {
                grid-template-columns: 1fr;
            }

            .botones-navegacion {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .error-mensaje {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Examen Auditoría de Sistemas I</h1>
            <p>18 preguntas avanzadas · Planificación, ejecución y auditoría forense · Puntaje total: 9 puntos</p>
        </div>

        <div class="content">
            <div id="pantalla-inicio" class="pantalla activo">
                <div class="inicio-form">
                    <div class="info-box">
                        <strong>📌 Información:</strong><br>
                        ⏱️ Sin límite | 📊 18 preguntas avanzadas | ⚠️ 1 intento | 💾 PDF obligatorio
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre <span class="requerido">*</span></label>
                        <input type="text" id="nombre" placeholder="Juan Pérez García">
                        <div class="error-mensaje" id="error-nombre"></div>
                    </div>

                    <div class="form-group">
                        <label for="cedula">Cédula <span class="requerido">*</span></label>
                        <input type="text" id="cedula" placeholder="12345678">
                        <div class="error-mensaje" id="error-cedula"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="requerido">*</span></label>
                        <input type="email" id="email" placeholder="estudiante@universidad.edu">
                        <div class="error-mensaje" id="error-email"></div>
                    </div>

                    <div class="form-group">
                        <label for="carrera">Carrera (opcional)</label>
                        <input type="text" id="carrera" placeholder="Ingeniería en Sistemas">
                    </div>

                    <button onclick="iniciarExamen()">Comenzar 🚀</button>
                </div>
            </div>

            <div id="pantalla-examen" class="pantalla">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>

                <div class="pregunta-header">
                    <span class="pregunta-numero">P<span class="pregunta-numero-grande" id="pregunta-actual">1</span>/<span id="pregunta-total">30</span></span>
                </div>

                <div id="pregunta-contenedor"></div>

                <div class="botones-navegacion">
                    <button class="btn-anterior" onclick="preguntaAnterior()">← Anterior</button>
                    <button class="btn-siguiente" onclick="preguntaSiguiente()">Siguiente →</button>
                </div>
            </div>

            <div id="pantalla-resultados" class="pantalla">
                <div id="resultado-contenedor"></div>
            </div>
        </div>

        <div class="footer">
            <p>© 2025 Examen Auditoría de Sistemas I — Preguntas Avanzadas</p>
        </div>
    </div>

    <script>
        const bancoPReguntas = [
            /* ── BLOQUE 1: ALCANCE Y RIESGOS ── */
            {id: 1, tipo: 'multiple',
             texto: '¿Qué elemento es INDISPENSABLE al definir el alcance de una auditoría de sistemas para garantizar su alineación con el negocio?',
             opciones: [
                 'Listar el inventario de hardware disponible',
                 'Identificar los objetivos estratégicos del negocio y los sistemas que los soportan',
                 'Revisar el organigrama de TI',
                 'Seleccionar la herramienta de auditoría más costosa'
             ],
             respuestaCorrecta: 1,
             comentario: 'El alcance debe partir de los objetivos del negocio: qué procesos críticos existen, qué sistemas los soportan, qué riesgos enfrentan y qué regulaciones aplican. Sin esa alineación, la auditoría puede cubrir áreas irrelevantes y omitir las críticas.',
             repaso: 'Alcance de auditoría y alineación estratégica'},

            {id: 2, tipo: 'multiple',
             texto: '¿Cuál de las siguientes herramientas se utiliza correctamente para clasificar riesgos tecnológicos ANTES de iniciar la auditoría?',
             opciones: [
                 'Diagrama de Gantt para planificar actividades',
                 'Matriz de riesgos que combina probabilidad e impacto, apoyada en dominios COBIT 2019',
                 'Árbol de decisión para seleccionar proveedores',
                 'Benchmarking de costos operativos'
             ],
             respuestaCorrecta: 1,
             comentario: 'La matriz de riesgos (probabilidad × impacto) permite priorizar los riesgos tecnológicos. COBIT 2019 provee el marco de dominios (EDM, APO, BAI, DSS, MEA) y el PESI aporta el contexto estratégico para identificar qué sistemas son críticos.',
             repaso: 'Matriz de riesgos, PESI, COBIT 2019'},

            /* ── BLOQUE 2: PLAN DE AUDITORÍA ── */
            {id: 3, tipo: 'multiple',
             texto: 'En el plan de auditoría de un sistema de pedidos en línea, ¿cuál de los siguientes componentes define CORRECTAMENTE las métricas de desempeño del proceso auditor?',
             opciones: [
                 'Número de reuniones realizadas con el cliente',
                 'Porcentaje de hallazgos documentados, tiempo de ejecución y cobertura de controles evaluados',
                 'Presupuesto total del proyecto de desarrollo',
                 'Cantidad de servidores físicos en el datacenter'
             ],
             respuestaCorrecta: 1,
             comentario: 'Las métricas de desempeño de la auditoría deben medir su propia eficacia: % de controles cubiertos, número de hallazgos por área, porcentaje de recomendaciones implementadas y tiempo ejecutado vs. planificado. Estos indicadores permiten evaluar si la auditoría cumplió su objetivo.',
             repaso: 'Plan de auditoría - métricas y KPIs'},

            {id: 4, tipo: 'multiple',
             texto: '¿Cuál es la función principal del PESI (Plan Estratégico de Sistemas de Información) dentro de una auditoría de TI?',
             opciones: [
                 'Establecer los salarios del equipo de auditoría',
                 'Proporcionar el contexto estratégico que permite priorizar los sistemas y riesgos a auditar',
                 'Definir la arquitectura técnica de los servidores',
                 'Reemplazar el plan de auditoría cuando no existe presupuesto'
             ],
             respuestaCorrecta: 1,
             comentario: 'El PESI alinea las TI con la estrategia del negocio, indicando qué sistemas son prioritarios, qué proyectos están en marcha y qué brechas existen. Para la auditoría, esto es clave: permite focalizar el trabajo en los sistemas estratégicamente críticos y evaluar si TI realmente soporta el negocio.',
             repaso: 'PESI y su rol en la auditoría de TI'},

            /* ── BLOQUE 3: CONTROLES Y CUMPLIMIENTO ── */
            {id: 5, tipo: 'asociacion',
             texto: 'En una plataforma de e-commerce, relaciona cada tipo de control con su ejemplo concreto:',
             columnaA: ['Control Preventivo', 'Control Detectivo', 'Control Correctivo'],
             columnaB: [
                 'Validación de formato y límites en el formulario de pedido antes de procesar',
                 'Alerta automática por transacción inusual detectada en el log de ventas',
                 'Reversión de cargo y bloqueo de cuenta tras confirmar fraude'
             ],
             respuestasCorrectas: {
                 'Control Preventivo': 'Validación de formato y límites en el formulario de pedido antes de procesar',
                 'Control Detectivo': 'Alerta automática por transacción inusual detectada en el log de ventas',
                 'Control Correctivo': 'Reversión de cargo y bloqueo de cuenta tras confirmar fraude'
             },
             comentario: 'Preventivo: actúa antes del evento (validaciones, autenticación MFA). Detectivo: actúa durante o después para identificar el problema (logs, alertas SIEM). Correctivo: repara el daño causado y restaura el estado seguro (reversión, parcheo, bloqueo).',
             repaso: 'Tipos de controles: preventivo, detectivo, correctivo'},

            {id: 6, tipo: 'multiple',
             texto: '¿Cuál de los siguientes criterios es ESENCIAL para considerar un control como eficaz Y eficiente?',
             opciones: [
                 'Que sea el más caro del mercado y esté certificado por una consultora internacional',
                 'Que reduzca el riesgo al nivel aceptable (eficacia) sin consumir más recursos de los necesarios (eficiencia)',
                 'Que esté documentado en inglés y revisado anualmente',
                 'Que lo apruebe el área de TI sin necesidad de validación por parte del negocio'
             ],
             respuestaCorrecta: 1,
             comentario: 'Un control es eficaz si cumple su objetivo de reducir el riesgo al nivel de tolerancia definido. Es eficiente si lo logra optimizando el uso de recursos (tiempo, dinero, personal). Ambos criterios deben coexistir: un control eficaz pero ineficiente es costoso; uno eficiente pero ineficaz no protege.',
             repaso: 'Criterios de eficacia y eficiencia de controles'},

            {id: 7, tipo: 'verdadero_falso',
             texto: 'ISO/IEC 27001 puede evaluarse mediante la revisión de la Declaración de Aplicabilidad (SoA) y la evidencia de implementación de los controles del Anexo A.',
             respuestaCorrecta: true,
             comentario: 'La Declaración de Aplicabilidad (Statement of Applicability) es el documento central de ISO/IEC 27001 que lista todos los controles del Anexo A, indica cuáles aplican y documenta la justificación. Auditar el SGSI implica verificar que los controles declarados como aplicables tengan evidencia real de implementación.',
             repaso: 'ISO/IEC 27001 - SoA y Anexo A'},

            /* ── BLOQUE 4: EJECUCIÓN DE LA AUDITORÍA ── */
            {id: 8, tipo: 'asociacion',
             texto: 'Relaciona cada fase de la ejecución de la auditoría de sistemas con su actividad principal:',
             columnaA: ['Planificación', 'Trabajo de campo', 'Comunicación de resultados'],
             columnaB: [
                 'Definición de alcance, objetivos, recursos y cronograma del proceso auditor',
                 'Recolección de evidencias, pruebas de controles y entrevistas con responsables',
                 'Elaboración del informe final con hallazgos, riesgos y recomendaciones'
             ],
             respuestasCorrectas: {
                 'Planificación': 'Definición de alcance, objetivos, recursos y cronograma del proceso auditor',
                 'Trabajo de campo': 'Recolección de evidencias, pruebas de controles y entrevistas con responsables',
                 'Comunicación de resultados': 'Elaboración del informe final con hallazgos, riesgos y recomendaciones'
             },
             comentario: 'Las fases de una auditoría de sistemas son: (1) Planificación: alcance, riesgos, cronograma; (2) Trabajo de campo: ejecución de pruebas, recolección de evidencia; (3) Comunicación: informe con hallazgos y recomendaciones priorizados por riesgo.',
             repaso: 'Fases de la ejecución de auditoría de sistemas'},

            {id: 9, tipo: 'multiple',
             texto: 'Para evaluar los controles de acceso durante una auditoría, ¿qué tipo de evidencia es MÁS relevante?',
             opciones: [
                 'Facturas de compra del software de gestión de identidades',
                 'Logs de acceso, matriz de roles y permisos (RBAC), y revisiones periódicas de cuentas activas',
                 'Certificados de capacitación del personal de TI',
                 'Manual de usuario del sistema de autenticación'
             ],
             respuestaCorrecta: 1,
             comentario: 'Para auditar controles de acceso se requiere: logs de autenticación (exitosos y fallidos), la matriz de roles y permisos implementada, reportes de revisión de cuentas (incluyendo cuentas inactivas y privilegiadas), y registros de solicitudes de acceso aprobadas. La evidencia documental sola es insuficiente.',
             repaso: 'Evidencias para auditar controles de acceso'},

            /* ── BLOQUE 5: LOGS Y MONITOREO ── */
            {id: 10, tipo: 'multiple',
             texto: '¿Cuál es la razón principal por la que es crítico garantizar la INTEGRIDAD de los logs durante una auditoría de TI?',
             opciones: [
                 'Para que el sistema funcione más rápido durante la auditoría',

            /* ── BLOQUE 7: ANÁLISIS DE INCIDENTES ── */
            {id: 14, tipo: 'verdadero_falso',

            /* ── BLOQUE 9: ÉTICA Y MARCO LEGAL ── */
            {id: 17, tipo: 'verdadero_falso',

            {id: 18, tipo: 'asociacion',
             texto: 'Relaciona cada requerimiento del RGPD con su implicación concreta en una auditoría forense:',
             columnaA: ['Minimización de datos', 'Derecho de acceso del interesado', 'Notificación de brecha'],
             columnaB: [

             respuestasCorrectas: {

             },
             comentario: 'El RGPD impone obligaciones directas sobre la auditoría forense: no se puede recopilar más datos personales de los necesarios (minimización), el proceso debe respetar derechos de los interesados salvo orden judicial, y si se descubre una brecha, el plazo de notificación de 72 horas es inapelable.',
             repaso: 'RGPD en el contexto de auditoría forense'}

        let estudiante = {}, respuestasEstudiante = {}, pantallActual = 'inicio', preguntaActual = 0;
        let examenesTomados = JSON.parse(localStorage.getItem('examenesTomados')) || [];
        let terminoSeleccionado = null;

        function validarRegistro() {
            const nombre = document.getElementById('nombre').value.trim();
            const cedula = document.getElementById('cedula').value.trim();
            const email = document.getElementById('email').value.trim();

            document.getElementById('error-nombre').textContent = '';
            document.getElementById('error-cedula').textContent = '';
            document.getElementById('error-email').textContent = '';

            if (!nombre || !cedula || !email) {
                if (!nombre) document.getElementById('error-nombre').textContent = 'Requerido';
                if (!cedula) document.getElementById('error-cedula').textContent = 'Requerida';
                if (!email) document.getElementById('error-email').textContent = 'Requerido';
                return false;
            }

            if (!/^\d+$/.test(cedula)) {
                document.getElementById('error-cedula').textContent = 'Solo números';
                return false;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('error-email').textContent = 'Inválido';
                return false;
            }

            if (examenesTomados.includes(cedula)) {
                alert('⚠️ Ya completaste este examen.');
                return false;
            }

            return true;
        }

        function iniciarExamen() {
            if (!validarRegistro()) return;
            estudiante = {
                nombre: document.getElementById('nombre').value.trim(),
                cedula: document.getElementById('cedula').value.trim(),
                email: document.getElementById('email').value.trim(),
                carrera: document.getElementById('carrera').value.trim()
            };
            pantallActual = 'examen';
            preguntaActual = 0;
            respuestasEstudiante = {};
            terminoSeleccionado = null;
            mostrarPantalla();
            mostrarPregunta();
        }

        function mostrarPantalla() {
            document.getElementById('pantalla-inicio').classList.remove('activo');
            document.getElementById('pantalla-examen').classList.remove('activo');
            document.getElementById('pantalla-resultados').classList.remove('activo');
            document.getElementById(`pantalla-${pantallActual}`).classList.add('activo');
        }

        function mostrarPregunta() {
            const p = bancoPReguntas[preguntaActual];
            const contenedor = document.getElementById('pregunta-contenedor');
            const progreso = ((preguntaActual + 1) / bancoPReguntas.length) * 100;

            document.getElementById('pregunta-actual').textContent = preguntaActual + 1;
            document.getElementById('pregunta-total').textContent = bancoPReguntas.length;
            document.getElementById('progress-fill').style.width = progreso + '%';

            let html = `<div class="pregunta-texto">${p.texto}</div>`;

            if (p.tipo === 'multiple') {
                html += '<div class="opciones">';
                p.opciones.forEach((op, i) => {
                    const sel = respuestasEstudiante[preguntaActual] === i ? 'seleccionado' : '';
                    html += `<div class="opcion ${sel}" onclick="seleccionarOpcion(${i})"><input type="radio" ${sel ? 'checked' : ''}><span class="opcion-texto">${op}</span></div>`;
                });
                html += '</div>';
            } else if (p.tipo === 'verdadero_falso') {
                const sv = respuestasEstudiante[preguntaActual] === true ? 'seleccionado' : '';
                const sf = respuestasEstudiante[preguntaActual] === false ? 'seleccionado' : '';
                html += `<div class="verdadero-falso"><div class="vf-opcion verdadero ${sv}" onclick="seleccionarVF(true)">✓ Verdadero</div><div class="vf-opcion falso ${sf}" onclick="seleccionarVF(false)">✗ Falso</div></div>`;
            } else if (p.tipo === 'asociacion') {
                html += '<div class="instruccion-asociacion">💡 Paso 1: Click término | Paso 2: Click definición</div>';
                const rr = respuestasEstudiante[preguntaActual] || {};
                html += '<div class="asociacion-lista">' + (Object.keys(rr).length > 0 ? Object.entries(rr).map(([k,v]) => `${k}→${v}`).join(' | ') : '<span class="asociacion-vacia">Sin respuestas</span>') + '</div>';
                html += '<div class="asociacion-wrapper"><div class="asociacion-columna"><div class="asociacion-titulo">A) Términos</div>';
                p.columnaA.forEach(t => {
                    const act = terminoSeleccionado === t ? 'termino-activo' : '';
                    const con = rr[t] ? 'conectado' : '';
                    html += `<div class="asociacion-item ${act} ${con}" onclick="clickTermino('${t}')">${t}</div>`;
                });
                html += '</div><div class="asociacion-columna"><div class="asociacion-titulo">B) Definiciones</div>';
                p.columnaB.forEach(d => {
                    const con = Object.values(rr).includes(d) ? 'conectado' : '';
                    html += `<div class="asociacion-item ${con}" onclick="clickDefinicion('${d}')">${d}</div>`;
                });
                html += '</div></div>';
            }

            contenedor.innerHTML = html;
            document.querySelector('.btn-anterior').disabled = preguntaActual === 0;
            document.querySelector('.btn-siguiente').textContent = preguntaActual === bancoPReguntas.length - 1 ? 'Finalizar →' : 'Siguiente →';
        }

        function seleccionarOpcion(i) { respuestasEstudiante[preguntaActual] = i; mostrarPregunta(); }
        function seleccionarVF(v) { respuestasEstudiante[preguntaActual] = v; mostrarPregunta(); }
        function clickTermino(t) { terminoSeleccionado = terminoSeleccionado === t ? null : t; mostrarPregunta(); }
        function clickDefinicion(d) {
            if (!terminoSeleccionado) { alert('👈 Selecciona un término'); return; }
            if (!respuestasEstudiante[preguntaActual]) respuestasEstudiante[preguntaActual] = {};
            respuestasEstudiante[preguntaActual][terminoSeleccionado] = d;
            terminoSeleccionado = null;
            mostrarPregunta();
        }
        function preguntaAnterior() { if (preguntaActual > 0) { preguntaActual--; terminoSeleccionado = null; mostrarPregunta(); } }
        function preguntaSiguiente() { if (preguntaActual < bancoPReguntas.length - 1) { preguntaActual++; terminoSeleccionado = null; mostrarPregunta(); } else finalizarExamen(); }

        function finalizarExamen() { pantallActual = 'resultados'; mostrarPantalla(); mostrarResultados(); }

        function mostrarResultados() {
            const contenedor = document.getElementById('resultado-contenedor');
            let aciertos = 0;
            const resultados = bancoPReguntas.map((p, i) => {
                let ok = false;
                if (p.tipo === 'multiple') ok = respuestasEstudiante[i] === p.respuestaCorrecta;
                else if (p.tipo === 'verdadero_falso') ok = respuestasEstudiante[i] === p.respuestaCorrecta;
                else if (p.tipo === 'asociacion') {
                    ok = true;
                    for (let t in p.respuestasCorrectas) if (respuestasEstudiante[i]?.[t] !== p.respuestasCorrectas[t]) ok = false;
                }
                if (ok) aciertos++;
                return {p, ok, i};
            });

            const pct = ((aciertos / 18) * 100).toFixed(1);
            const apr = aciertos >= 13;
            const pts = aciertos * 0.5;

            let html = `<div class="advertencia-pdf">⚠️ DESCARGA PDF - OBLIGATORIO</div>
                <div class="resultado-header ${apr ? 'aprobado' : 'reprobado'}">
                    <div class="resultado-icono">${apr ? '✓' : '✗'}</div>
                    <div class="resultado-titulo">${apr ? '¡Felicidades!' : 'No aprobaste'}</div>
                </div>
                <div class="puntuacion">
                    <div class="puntuacion-numero">${aciertos}/18</div>
                    <div class="puntuacion-porcentaje">${pct}% - ${pts.toFixed(1)}/9 puntos</div>
                </div>
                <div class="detalles-respuestas">
                    <h3>📋 ANÁLISIS</h3>`;

            resultados.forEach(({p, ok, i}) => {
                html += `<div class="respuesta-item">
                    <div class="respuesta-numero">P${i+1}: ${p.texto}</div>
                    <span class="respuesta-estado ${ok ? 'respuesta-correcta' : 'respuesta-incorrecta'}">${ok ? '✓ CORRECTO' : '✗ INCORRECTO'}</span>
                    <div class="justificacion ${ok ? 'justificacion-bien' : 'justificacion-mejorar'}">
                        <strong>${ok ? '👍 ¡Bien hecho!' : '📝 La próxima te irá mejor'}</strong><br>${p.comentario}
                    </div>
                    <div class="sugerencia-repaso">📚 Repasa: ${p.repaso}</div>
                </div>`;
            });

            html += `</div><div style="background:#f0f4ff;border-left:4px solid #667eea;padding:15px;border-radius:5px;margin:20px 0;">
                <strong>Nombre:</strong> ${estudiante.nombre} | <strong>Cédula:</strong> ${estudiante.cedula}<br>
                <strong>Email:</strong> ${estudiante.email} | <strong>Fecha:</strong> ${new Date().toLocaleDateString('es-ES')}
            </div>
            <div class="botones-finales">
                <button class="btn-descargar" onclick="descargarPDF()">💾 Descargar PDF</button>
            </div>`;

            contenedor.innerHTML = html;
        }

        function descargarPDF() {
            let aciertos = 0;
            bancoPReguntas.forEach((p, i) => {
                if (p.tipo === 'multiple') { if (respuestasEstudiante[i] === p.respuestaCorrecta) aciertos++; }
                else if (p.tipo === 'verdadero_falso') { if (respuestasEstudiante[i] === p.respuestaCorrecta) aciertos++; }
                else if (p.tipo === 'asociacion') {
                    let ok = true;
                    for (let t in p.respuestasCorrectas) if (respuestasEstudiante[i]?.[t] !== p.respuestasCorrectas[t]) ok = false;
                    if (ok) aciertos++;
                }
            });

            const pts = aciertos * 0.5;
            const pct = ((aciertos / 18) * 100).toFixed(1);
            const apr = aciertos >= 13;

            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0}body{font-family:Arial;color:#333;font-size:11px;line-height:1.3}
.header{border-bottom:2px solid #667eea;padding:10px 0;margin-bottom:10px}
.titulo{font-size:16px;font-weight:bold;color:#667eea;margin-bottom:5px}
.info{font-size:10px;margin:2px 0}
.resultado{font-size:12px;font-weight:bold;color:${apr?'#16a34a':'#dc2626'};background:${apr?'#f0fdf4':'#fef2f2'};padding:8px;border-left:2px solid ${apr?'#22c55e':'#ef4444'};margin:10px 0}
.preg{margin:8px 0;padding:6px;background:#f9f9f9;border-left:2px solid #667eea;page-break-inside:avoid}

.mal{color:#dc2626;font-weight:bold}

.sep{page-break-after:always;margin:10px 0}
<\/style><\/head><body>`;

            html += `<div class="header">
<div class="titulo">EXAMEN AUDITORÍA DE SISTEMAS I<\/div>
<div class="info">Estudiante: ${estudiante.nombre} | Cédula: ${estudiante.cedula}<\/div>
<div class="info">Email: ${estudiante.email} | Fecha: ${new Date().toLocaleDateString('es-ES')}<\/div>
<\/div>

<div class="resultado">${apr?'✓ APROBADO':'✗ NO APROBADO'} | ${aciertos}/18 (${pct}%) | ${pts.toFixed(1)}/9 puntos<\/div>

<h3 style="font-size:12px;margin:8px 0;">ANÁLISIS DE RESPUESTAS<\/h3>`;

            bancoPReguntas.forEach((p, i) => {
                let ok = false;
                if (p.tipo === 'multiple') ok = respuestasEstudiante[i] === p.respuestaCorrecta;
                else if (p.tipo === 'verdadero_falso') ok = respuestasEstudiante[i] === p.respuestaCorrecta;
                else if (p.tipo === 'asociacion') {
                    ok = true;
                    for (let t in p.respuestasCorrectas) if (respuestasEstudiante[i]?.[t] !== p.respuestasCorrectas[t]) ok = false;
                }

                html += `<div class="preg">
<div class="resp-txt"><strong>P${i+1}:<\/strong> ${p.texto}<\/div>
<div class="resp-txt"><span class="${ok?'bien':'mal'}">${ok?'✓ CORRECTO':'✗ INCORRECTO'}<\/span> - ${ok?'👍 ¡Bien hecho!':'📝 La próxima te irá mejor'}<\/div>
<div class="resp-txt" style="font-size:9px;margin-top:2px;">${p.comentario}<\/div>
<div class="resp-txt" style="font-size:9px;color:#666;">Repasa: ${p.repaso}<\/div>
<\/div>`;
            });

            html += `<div class="sep"><\/div>
<div class="header">
<div class="titulo">RESUMEN FINAL<\/div>
<div class="info">Estudiante: ${estudiante.nombre}<\/div>
<div class="info">Cédula: ${estudiante.cedula}<\/div>
<div class="info">Fecha: ${new Date().toLocaleDateString('es-ES')}<\/div>
<\/div>

<div class="resultado" style="text-align:center;">${apr?'✓ APROBADO':'✗ NO APROBADO'} | ${aciertos}/18 | ${pct}% | ${pts.toFixed(1)}/9 puntos<\/div>

<div class="footer">
<p>© 2025 Auditoría de Sistemas I — Preguntas Avanzadas<\/p>
<\/div>
<\/body><\/html>`;

            const ele = document.createElement('div');
            ele.innerHTML = html;
            const opt = {
                margin: [6, 6, 6, 6],
                filename: `Examen_${estudiante.cedula}_${estudiante.nombre.replace(/\s/g,'_')}.pdf`,
                image: {type:'jpeg',quality:0.9},
                html2canvas: {scale:1.5,useCORS:true},
                jsPDF: {unit:'mm',format:'a4',orientation:'portrait',compress:true}
            };
            html2pdf().set(opt).from(ele).save().then(() => {
                examenesTomados.push(estudiante.cedula);
                localStorage.setItem('examenesTomados', JSON.stringify(examenesTomados));
                alert('✓ PDF descargado\n\n⚠️ Sube a la plataforma');
            });
        }
    </script>
